root = "."
testdata_dir = "testdata"
tmp_dir = "build"

[build]
  args_bin = []
  entrypoint = "./build/discboeing.exe"
  # Windows ARM64 fails to build this server with the debug gcflags used in the
  # Unix config, so use a plain development build here.
  cmd = "go build -o ./build/discboeing.exe ./cmd/server"
  delay = 1000
  exclude_dir = ["assets", "buid", "vendor", "testdata", "node_modules", "workspaces", "static/ui/dist"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  include_dir = ["cmd", "docs", "internal", "scripts"]
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  include_file = [".env"]
  kill_delay = "10m"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
