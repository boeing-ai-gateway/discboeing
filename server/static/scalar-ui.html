<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Discobot API Reference</title>
		<style>
			body {
				margin: 0;
			}
		</style>
	</head>
	<body>
		<div id="discobot-api-reference"></div>
		<script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
		<script>
			Scalar.createApiReference("#discobot-api-reference", {
				sources: [
					{
						title: "Discobot API",
						slug: "discobot-api",
						url: "/api/openapi.json",
						default: true,
					},
				],
				agent: {
					disabled: true,
				},
			});
		</script>
	</body>
</html>
