root = "."
testdata_dir = "testdata"
tmp_dir = "build"

[build]
  args_bin = []
  entrypoint = "./build/discboeing"
  cmd = "go build -gcflags=\"all=-N -l\" -o ./build/discboeing ./cmd/server && if [ \"$(uname)\" = \"Darwin\" ]; then codesign --entitlements discboeing-server.entitlements --force --sign - ./build/discboeing; fi"
  delay = 1000
  exclude_dir = ["assets", "buid", "vendor", "testdata", "node_modules", "workspaces", "static/ui/dist"]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = "./scripts/debug-run.sh"
  include_dir = ["cmd", "docs", "internal", "scripts"]
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  include_file = [".env"]
  kill_delay = "10m"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
