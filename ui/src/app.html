<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Discboeing Svelte redesign workspace" />
		<link
			rel="icon"
			href="%sveltekit.assets%/favicon.svg"
			type="image/svg+xml"
		/>
		<link
			rel="icon"
			href="%sveltekit.assets%/favicon-32x32.png"
			sizes="32x32"
			type="image/png"
		/>
		<link
			rel="icon"
			href="%sveltekit.assets%/favicon-128x128.png"
			sizes="128x128"
			type="image/png"
		/>
		<link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
		<script>
			try {
				const storedTheme = localStorage.getItem("theme");
				const theme =
					storedTheme === "light" || storedTheme === "dark"
						? storedTheme
						: window.matchMedia("(prefers-color-scheme: dark)").matches
							? "dark"
							: "light";
				const storedColorScheme = localStorage.getItem("theme.colorScheme");

				document.documentElement.classList.toggle("dark", theme === "dark");
				if (storedColorScheme) {
					document.documentElement.setAttribute(
						"data-theme",
						storedColorScheme,
					);
				}
			} catch (_error) {
				document.documentElement.classList.add("dark");
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
