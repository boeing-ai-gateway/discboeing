name: WebSearch
description: |-
  Search the public web for up-to-date information.

  After using this tool, include a `Sources:` section in your final answer with relevant result links in markdown. Use the current year in searches for recent docs or current events.
inputSchema:
  type: object
  additionalProperties: false
  properties:
    query:
      type: string
      minLength: 2
      description: Search query.
    allowed_domains:
      type: array
      items:
        type: string
      description: Restrict results to these domains.
    blocked_domains:
      type: array
      items:
        type: string
      description: Exclude these domains.
  required:
    - query
