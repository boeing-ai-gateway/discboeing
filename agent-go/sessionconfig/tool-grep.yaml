name: Grep
description: |-
  Search file contents with ripgrep.

  Use this instead of shell `grep` or `rg`. `pattern` is a regex. Use `glob` or `type` to narrow files, `output_mode` to choose result shape, and `multiline: true` for cross-line matches.
inputSchema:
  type: object
  additionalProperties: false
  properties:
    pattern:
      type: string
      description: Regex pattern to search for.
    path:
      type: string
      description: File or directory to search.
    glob:
      type: string
      description: Glob filter for files.
    type:
      type: string
      description: Ripgrep file type filter.
    output_mode:
      type: string
      enum:
        - content
        - files_with_matches
        - count
      description: Result format.
    -i:
      type: boolean
      description: Case-insensitive search.
    -n:
      type: boolean
      description: Show line numbers in content mode.
    -A:
      type: number
      description: Lines after each match in content mode.
    -B:
      type: number
      description: Lines before each match in content mode.
    -C:
      type: number
      description: Alias for context.
    context:
      type: number
      description: Lines before and after each match in content mode.
    multiline:
      type: boolean
      description: Allow matches to span lines.
    head_limit:
      type: number
      description: Limit returned lines or entries.
    offset:
      type: number
      description: Skip initial lines or entries before applying head_limit.
  required:
    - pattern
