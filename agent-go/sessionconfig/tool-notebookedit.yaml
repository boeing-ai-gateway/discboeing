name: NotebookEdit
description: |-
  Replace, insert, or delete a Jupyter notebook cell.

  `notebook_path` must be absolute. Use `edit_mode=insert` to add a cell and `edit_mode=delete` to remove one.
inputSchema:
  type: object
  additionalProperties: false
  properties:
    notebook_path:
      type: string
      description: Absolute path to the notebook.
    new_source:
      type: string
      description: New cell source.
    cell_id:
      type: string
      description: Target cell ID. For inserts, the new cell goes after this cell.
    cell_type:
      type: string
      enum:
        - code
        - markdown
      description: Cell type. Required for inserts.
    edit_mode:
      type: string
      enum:
        - replace
        - insert
        - delete
      description: Edit operation.
  required:
    - notebook_path
    - new_source
