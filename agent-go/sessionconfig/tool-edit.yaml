name: Edit
description: |-
  Replace exact text in an existing file.

  Read the file first. Match text exactly, including indentation. If `old_string` is not unique, include more context or use `replace_all`.
inputSchema:
  type: object
  additionalProperties: false
  properties:
    file_path:
      type: string
      description: Absolute path to the file to edit.
    old_string:
      type: string
      description: Exact text to replace.
    new_string:
      type: string
      description: Replacement text.
    replace_all:
      type: boolean
      default: false
      description: Replace every match instead of one match.
  required:
    - file_path
    - old_string
    - new_string
