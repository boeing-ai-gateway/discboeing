name: Edit
description: |-
  Replace text in an existing file.

  Read the file first. Edit first looks for an exact match. If none is found, it falls back to a lenient line-based match, including whitespace normalization. If `old_string` is not unique, include more context or use `replace_all`.
inputSchema:
  type: object
  additionalProperties: false
  properties:
    file_path:
      type: string
      description: Absolute path to the file to edit.
    old_string:
      type: string
      description: Text to replace. Exact matches are preferred; a lenient fallback match is used only when needed.
    new_string:
      type: string
      description: Replacement text.
    replace_all:
      type: boolean
      default: false
      description: Replace every match instead of one match.
  required:
    - file_path
    - old_string
    - new_string
