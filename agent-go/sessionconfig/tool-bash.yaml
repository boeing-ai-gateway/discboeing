name: Bash
description: |-
  Run a bash command and return its output.

  Use dedicated tools instead of shell equivalents when possible:
  - Glob for file search
  - Grep for content search
  - Read for file contents
  - Edit for edits
  - Write for new files

  Prefer absolute paths and quote paths with spaces. Use `run_in_background` for long-running commands. Prefer one Bash call with `&&` for dependent commands and separate tool calls for independent commands. Large output is capped at 2000 lines or 50 KB inline; the full output is saved to a file when truncated.

  For git work, avoid destructive commands, force pushes, or skipped hooks unless the user explicitly requests them. Do not commit or push unless asked.

  If a command needs a secret, first use RequestUserCredential to request it. Later Bash calls may reuse approved credential ids and approved-use ids through `credentialUses`. Never invent or guess credential ids or approved-use ids; only use ids returned by RequestUserCredential.

  Commands that invoke `sudo` require explicit user approval through RequestUserCredential. Request a sudo approval credential with envVar `DISCOBOT_SUDO_TOKEN` and an approved use describing the exact privileged action, then retry the Bash command with the returned `credentialUses` binding.
inputSchema:
  type: object
  additionalProperties: false
  properties:
    command:
      type: string
      description: Command to execute.
    description:
      type: string
      description: Short active-voice summary of what the command does.
    timeout:
      type: number
      description: Optional timeout in milliseconds, up to 600000.
    run_in_background:
      type: boolean
      description: Run the command in the background.
    credentialUses:
      type: array
      description: Optional approved credential bindings for this command. Use ids returned by RequestUserCredential.
      items:
        type: object
        additionalProperties: false
        properties:
          credentialId:
            type: string
            description: Previously returned session-scoped credential id.
          useId:
            type: string
            description: Previously returned session-scoped approved-use id.
          envVar:
            type: string
            description: Environment variable name to bind the credential to for this command.
        required:
          - credentialId
          - useId
          - envVar
  required:
    - command
