name: RequestUserCredential
description: |-
  Request one or more credentials from the user for the current session.

  Use this tool when you need the user to provide a token, API key, password, or other secret to continue.

  This tool is separate from AskUserQuestion:
  - AskUserQuestion is for normal questions and choices.
  - RequestUserCredential is for secrets and credentials.

  The secret value itself is not returned in the tool result. Instead:
  - the user provides it through the client
  - Discboeing attaches the credential to the current session
  - the tool result returns a session-scoped credential id and session-scoped approved-use ids you can reference later
  - later Bash calls should attach those ids when reusing the credential

  Use `justification` for the exact current-step reason the credential is needed right now. Use `approvedUses` for short reusable capability descriptions that later commands may reference, such as "clone private repositories" or "create pull requests with gh". Avoid repeating the full current justification in approved uses. Never invent or guess credential ids or approved-use ids; only use ids returned by prior RequestUserCredential results.
inputSchema:
  type: object
  additionalProperties: false
  properties:
    credentials:
      type: array
      minItems: 1
      maxItems: 4
      description: Credential requests to present to the user.
      items:
        type: object
        additionalProperties: false
        properties:
          envVar:
            type: string
            description: Environment variable name that should receive the credential value when used later.
          name:
            type: string
            description: Short human-readable credential name shown to the user.
          justification:
            type: string
            description: Why the credential is needed for the current step.
          approvedUses:
            type: array
            description: Required short reusable capability descriptions for later commands in this session. Approved uses will return stable ids for reuse in later Bash calls.
            items:
              type: object
              additionalProperties: false
              properties:
                description:
                  type: string
                  description: Short approved-use description for later commands, such as clone private repositories.
              required:
                - description
        required:
          - envVar
          - name
          - justification
          - approvedUses
  required:
    - credentials
