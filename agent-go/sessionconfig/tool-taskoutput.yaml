name: TaskOutput
description: |-
  Get output from a running or completed background task.

  Use `block: true` to wait for completion or `block: false` for a quick status check.
inputSchema:
  type: object
  additionalProperties: false
  properties:
    task_id:
      type: string
      description: Task ID to inspect.
    block:
      type: boolean
      default: true
      description: Wait for completion before returning.
    timeout:
      type: number
      default: 30000
      minimum: 0
      maximum: 600000
      description: Max wait time in milliseconds.
  required:
    - task_id
    - block
    - timeout
