root = "."
testdata_dir = "testdata"
tmp_dir = "build"

[build]
  args_bin = []
  entrypoint = "./build/meta"
  cmd = "go generate ./api ./internal/routes && go build -gcflags=\"all=-N -l\" -o ./build/meta ./cmd/meta"
  delay = 1000
  exclude_dir = ["assets", "build", "vendor", "testdata", "node_modules"]
  exclude_file = []
  exclude_regex = ["_test.go", "\\.gen\\.go$"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = "./build/meta"
  include_dir = ["api", "cmd", "docs", "internal"]
  include_ext = ["go", "json", "yaml", "yml", "tpl", "tmpl", "html", "sql"]
  include_file = [".env"]
  kill_delay = "10m"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
