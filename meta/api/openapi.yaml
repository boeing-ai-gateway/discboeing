openapi: 3.1.0
info:
  title: Discobot Meta API
  version: 0.1.0
  summary: Central metadata, identity, authorization, and secret envelope API for Discobot.
  description: |
    Meta is Discobot's central metadata service. It owns organizations, users,
    devices, groups, projects, agent sessions, encrypted secret envelopes, secret
    bindings, and route-level authorization decisions.

    This specification starts with routes only. Request and response schemas are
    intentionally placeholders and should be replaced with shared component
    schemas once the route surface stabilizes.
servers:
  - url: /
    description: Current Meta service origin. Shortcut routes without `/v1/org/{organizationDomain}` resolve to the public organization.

tags:
  - name: OIDC
    description: Standard OIDC discovery, authorization, token, and userinfo endpoints.
  - name: Organizations
    description: Top-level organization hierarchy, organization members, and organization-scoped resource roots.
  - name: Users
    description: Current user profile and authenticated user session management.
  - name: Devices
    description: User device registration, approval, and lifecycle management for secret recipient keys.
  - name: Groups
    description: Groups, group members, and links to external group identities.
  - name: Projects
    description: Projects and project membership.
  - name: Agent Sessions
    description: Discobot coding-agent sessions and session-specific membership.
  - name: Tokens
    description: OAuth-compatible token exchange and token introspection.
  - name: Secrets
    description: Secret metadata, encrypted versions, bindings, and recipient wraps.
  - name: Audit
    description: Security-sensitive activity and authorization audit events.

paths:
  /.well-known/openid-configuration:
    get:
      tags: [OIDC]
      operationId: getOpenIDConfiguration
      x-discobot-action: oidc.discovery.read
      summary: Get OIDC discovery metadata.
      description: |
        Returns OIDC discovery metadata for Meta as an identity provider. Clients
        and agents use this document to find the authorization endpoint, token
        endpoint, JWKS URI, issuer, supported scopes, supported claims, and
        signing algorithms.
      responses:
        "200":
          description: OIDC discovery document.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /.well-known/oauth-authorization-server:
    get:
      tags: [OIDC, Tokens]
      operationId: getOAuthAuthorizationMetadata
      x-discobot-action: oauth.metadata.read
      summary: Get OAuth authorization server metadata.
      description: |
        Returns OAuth 2.0 Authorization Server Metadata for Meta. OAuth clients
        use this document to find the authorization endpoint, token endpoint,
        JWKS URI, supported grant types, supported scopes, and PKCE methods.
      responses:
        "200":
          description: OAuth authorization server metadata document.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /.well-known/jwks.json:
    get:
      tags: [OIDC]
      operationId: getJWKS
      x-discobot-action: oidc.jwks.read
      summary: Get public JWT signing keys.
      description: |
        Returns Meta's public JSON Web Key Set. Agents cache these keys and use
        them to validate JWT access tokens issued by Meta. Agents should refresh
        this endpoint on unknown `kid` or cache expiry.
      responses:
        "200":
          description: JSON Web Key Set.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /authorize:
    get:
      tags: [OIDC]
      operationId: authorize
      x-discobot-action: oauth.authorize
      summary: Start or continue an OIDC authorization flow.
      description: |
        Browser-based OIDC authorization endpoint. The user authenticates to
        Meta or an upstream identity provider. On success, Meta redirects back to
        the client's redirect URI with an authorization code.
      parameters:
        - name: client_id
          in: query
          required: true
          schema: { type: string }
          description: OAuth client ID.
        - name: redirect_uri
          in: query
          required: true
          schema: { type: string, format: uri }
          description: Registered redirect URI.
        - name: response_type
          in: query
          required: true
          schema: { type: string, const: code }
          description: Must be `code` for authorization-code flow.
        - name: scope
          in: query
          required: true
          schema: { type: string }
          description: Space-delimited OAuth/OIDC scopes.
        - name: state
          in: query
          required: false
          schema: { type: string }
          description: Client-provided CSRF/state value returned with the redirect.
        - name: nonce
          in: query
          required: false
          schema: { type: string }
          description: OIDC nonce included in issued ID token.
        - name: code_challenge
          in: query
          required: false
          schema: { type: string }
          description: PKCE code challenge.
        - name: code_challenge_method
          in: query
          required: false
          schema: { type: string, enum: [S256] }
          description: PKCE code challenge method.
      responses:
        "302":
          description: Redirects to the client redirect URI or upstream identity provider.
        "400":
          description: Invalid authorization request.

  /token:
    post:
      tags: [OIDC, Tokens]
      operationId: token
      x-discobot-action: oauth.token
      summary: Exchange OAuth tokens.
      description: |
        OAuth token endpoint. Supports authorization-code exchange for normal
        login and OAuth token exchange for minting short-lived, agent-scoped
        access tokens.

        For user-to-agent communication, clients should request token exchange
        with an audience like `agent-session:{sessionId}`. Agents then accept
        only tokens whose audience matches their own agent session ID.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Token response containing ID/access/refresh tokens or exchanged access token.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400":
          description: Invalid token request.
        "401":
          description: Invalid client or subject token.

  /userinfo:
    get:
      tags: [OIDC]
      operationId: getUserInfo
      x-discobot-action: userinfo.read
      summary: Get OIDC userinfo claims.
      description: |
        Returns user profile claims for the bearer access token. This endpoint is
        for OIDC client compatibility. Agent API authorization should use
        agent-scoped access tokens and local JWT validation instead.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Userinfo claims.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Missing or invalid bearer token.

  /logout:
    post:
      tags: [OIDC, Users]
      operationId: logout
      x-discobot-action: logout
      summary: Revoke the current user login session.
      description: |
        Revokes the current user session or performs provider logout behavior.
        Existing short-lived access tokens may remain valid until expiry unless
        agents introspect them.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Current login session revoked.
        "401":
          description: Missing or invalid bearer token.



  /whoami:
    get:
      tags: [Users]
      operationId: whoami
      x-discobot-action: user.whoami
      summary: Get the current authenticated principal.
      description: |
        Returns the current authenticated principal. Initially this supports
        bootstrap bearer tokens and reports the bootstrap organization context.
        Later this route will also report normal user session context.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current principal context.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Missing or invalid bearer token.

  /v1/org:
    get:
      tags: [Organizations]
      operationId: listOrganizations
      x-discobot-action: organization.list
      summary: List organizations visible to the caller.
      description: |
        Lists organizations the caller belongs to. The special organization with
        domain `public` is the default public organization used by shortcut routes
        such as `/v1/projects`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Organizations.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Organizations]
      operationId: createOrganization
      x-discobot-action: organization.create
      summary: Create an organization.
      description: Creates a top-level Meta organization.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Organization created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/org/{organizationDomain}:
    get:
      tags: [Organizations]
      operationId: getOrganization
      x-discobot-action: organization.read
      summary: Get organization metadata.
      description: Returns metadata for an organization. `organizationDomain` is the route-facing organization domain, such as `example.com`, or the special `public` organization.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
      responses:
        "200":
          description: Organization metadata.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    patch:
      tags: [Organizations]
      operationId: updateOrganization
      x-discobot-action: organization.update
      summary: Update organization metadata.
      description: Updates organization metadata according to organization admin rules.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Organization updated.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/org/{organizationDomain}/members:
    get:
      tags: [Organizations]
      operationId: listOrganizationMembers
      x-discobot-action: organization.member.list
      summary: List organization members.
      description: Lists users that belong to an organization.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
      responses:
        "200":
          description: Organization members.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Organizations]
      operationId: addOrganizationMember
      x-discobot-action: organization.member.add
      summary: Add an organization member.
      description: Adds a user to an organization with an organization role.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Organization member added.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/org/{organizationDomain}/members/{userId}:
    patch:
      tags: [Organizations]
      operationId: updateOrganizationMember
      x-discobot-action: organization.member.update
      summary: Update organization member role.
      description: Updates an organization member role.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Organization member updated.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    delete:
      tags: [Organizations]
      operationId: removeOrganizationMember
      x-discobot-action: organization.member.remove
      summary: Remove organization member.
      description: Removes a user from an organization. Last-owner protections apply.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
        - $ref: '#/components/parameters/UserId'
      responses:
        "204":
          description: Organization member removed.


  /v1/org/{organizationDomain}/oauth-applications:
    get:
      tags: [Organizations]
      operationId: listOrganizationOAuthApplications
      x-discobot-action: oauth_application.list
      summary: List OAuth applications in an organization.
      description: Lists organization-scoped OAuth/OIDC client applications. Public organization admins use this to manage the default public login surface.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
      responses:
        "200":
          description: Organization OAuth applications.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Organizations]
      operationId: createOrganizationOAuthApplication
      x-discobot-action: oauth_application.create
      x-discobot-apply:
        resource: OAuthApplication
        listOperationId: listOrganizationOAuthApplications
        getOperationId: getOrganizationOAuthApplication
        updateOperationId: updateOrganizationOAuthApplication
        scopeField: organization
        scopeParam: organizationDomain
        idField: id
        idParam: oauthApplicationId
        nameField: name
        matchFields: [provider]
      summary: Create an OAuth application in an organization.
      description: Creates an organization-scoped OAuth/OIDC client application.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthApplicationCreateRequest'
      responses:
        "201":
          description: OAuth application created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/org/{organizationDomain}/oauth-applications/{oauthApplicationId}:
    get:
      tags: [Organizations]
      operationId: getOrganizationOAuthApplication
      x-discobot-action: oauth_application.read
      summary: Get OAuth application metadata.
      description: Returns metadata for one organization-scoped OAuth/OIDC client application.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
        - $ref: '#/components/parameters/OAuthApplicationId'
      responses:
        "200":
          description: OAuth application metadata.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    patch:
      tags: [Organizations]
      operationId: updateOrganizationOAuthApplication
      x-discobot-action: oauth_application.update
      summary: Update OAuth application metadata.
      description: Updates redirect URIs, grant types, response types, scopes, auth method, name, or status for an organization-scoped OAuth application.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
        - $ref: '#/components/parameters/OAuthApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthApplicationUpdateRequest'
      responses:
        "200":
          description: OAuth application updated.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    delete:
      tags: [Organizations]
      operationId: deleteOrganizationOAuthApplication
      x-discobot-action: oauth_application.delete
      summary: Delete or disable an OAuth application.
      description: Deletes or disables an organization-scoped OAuth application.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
        - $ref: '#/components/parameters/OAuthApplicationId'
      responses:
        "204":
          description: OAuth application deleted or disabled.

  /v1/org/{organizationDomain}/groups:
    get:
      tags: [Groups]
      operationId: listOrganizationGroups
      x-discobot-action: group.list
      summary: List groups in an organization.
      description: Lists groups in the selected organization. `/v1/groups` is the public-organization shortcut.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
      responses:
        "200":
          description: Organization groups.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Groups]
      operationId: createOrganizationGroup
      x-discobot-action: group.create
      summary: Create a group in an organization.
      description: Creates a group under the selected organization.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Organization group created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/org/{organizationDomain}/projects:
    get:
      tags: [Projects]
      operationId: listOrganizationProjects
      x-discobot-action: project.list
      summary: List projects in an organization.
      description: Lists projects in the selected organization. `/v1/projects` is the public-organization shortcut.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
      responses:
        "200":
          description: Organization projects.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Projects]
      operationId: createOrganizationProject
      x-discobot-action: project.create
      summary: Create a project in an organization.
      description: Creates a project under the selected organization.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Organization project created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/org/{organizationDomain}/secrets:
    get:
      tags: [Secrets]
      operationId: listOrganizationSecrets
      x-discobot-action: secret.list
      summary: List secrets in an organization.
      description: Lists secret metadata in the selected organization. `/v1/secrets` is the public-organization shortcut.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
      responses:
        "200":
          description: Organization secret metadata list.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Secrets]
      operationId: createOrganizationSecret
      x-discobot-action: secret.create
      summary: Create an encrypted secret in an organization.
      description: Creates secret metadata and an encrypted version under the selected organization.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationDomain'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Organization secret created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/users/me:
    get:
      tags: [Users]
      operationId: getCurrentUser
      x-discobot-action: user.me.read
      summary: Get the current user.
      description: Returns the authenticated user's canonical Meta profile.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Missing or invalid bearer token.

  /v1/users/me/sessions:
    get:
      tags: [Users]
      operationId: listCurrentUserSessions
      x-discobot-action: user_session.list
      summary: List current user's login sessions.
      description: |
        Lists authenticated user sessions across browsers, desktop shells, API
        clients, and refresh-token contexts. This supports account/session
        management UI.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User sessions.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Missing or invalid bearer token.

  /v1/users/me/sessions/{sessionId}:
    delete:
      tags: [Users]
      operationId: revokeCurrentUserSession
      x-discobot-action: user_session.revoke
      summary: Revoke a user login session.
      description: |
        Revokes one of the current user's login sessions. This prevents that
        session from minting new access tokens. Short-lived already-issued JWTs
        may remain valid until expiry unless introspected.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        "204":
          description: Session revoked.
        "401":
          description: Missing or invalid bearer token.
        "403":
          description: User cannot revoke this session.
        "404":
          description: Session not found.

  /v1/users/me/devices:
    get:
      tags: [Devices]
      operationId: listCurrentUserDevices
      x-discobot-action: device.list
      summary: List current user's devices.
      description: Lists active, pending, disabled, and deleted user devices visible to the current user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User devices.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Devices]
      operationId: registerCurrentUserDevice
      x-discobot-action: device.register
      summary: Register a user device public key.
      description: |
        Registers a device and its public key. If this is the user's first
        device, Meta can mark it active after login. Otherwise, the device starts
        pending and must be approved by an existing active device before it can
        unwrap existing secrets.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Device registered as active or pending.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Missing or invalid bearer token.

  /v1/users/me/devices/pending:
    get:
      tags: [Devices]
      operationId: listPendingCurrentUserDevices
      x-discobot-action: device.pending.list
      summary: List pending device approvals.
      description: |
        Lists pending devices for the current user. Existing active devices use
        this endpoint to show approval prompts for new devices.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Pending devices.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Missing or invalid bearer token.

  /v1/users/me/devices/{deviceId}:
    delete:
      tags: [Devices]
      operationId: deleteCurrentUserDevice
      x-discobot-action: device.delete
      summary: Disable or delete a user device.
      description: |
        Disables or deletes one of the current user's devices. If this is the
        user's last active device, clients should warn that existing secrets may
        become unrecoverable and need to be re-entered or rotated.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        "204":
          description: Device disabled or deleted.
        "401":
          description: Missing or invalid bearer token.
        "403":
          description: User cannot modify this device.
        "404":
          description: Device not found.

  /v1/users/me/devices/{deviceId}/approval-plan:
    post:
      tags: [Devices, Secrets]
      operationId: createDeviceApprovalPlan
      x-discobot-action: device.approval_plan
      summary: Plan new-device approval wraps.
      description: |
        Returns encrypted secret versions and wraps decryptable by the approving
        device so the client can create recipient wraps for a pending device.
        Meta returns ciphertext and wrapping metadata only; it does not perform
        cryptography.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        "200":
          description: Approval plan for pending device.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Missing or invalid bearer token.
        "403":
          description: Current device cannot approve this pending device.
        "404":
          description: Pending device not found.

  /v1/users/me/devices/{deviceId}/approve:
    post:
      tags: [Devices, Secrets]
      operationId: approveCurrentUserDevice
      x-discobot-action: device.approve
      summary: Approve a pending device.
      description: |
        Marks a pending device active after an existing active device uploads the
        recipient wraps needed by the new device. Meta validates ownership and
        wrap metadata but does not unwrap any keys.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Device approved.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          description: Missing or invalid bearer token.
        "403":
          description: Current device cannot approve this pending device.
        "404":
          description: Pending device not found.

  /v1/groups:
    get:
      tags: [Groups]
      operationId: listGroups
      x-discobot-action: group.list
      summary: List groups visible to the caller.
      description: Lists groups the caller belongs to or can administer.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Groups.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Groups]
      operationId: createGroup
      x-discobot-action: group.create
