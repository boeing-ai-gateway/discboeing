      operationId: updateSecretVersion
      x-discobot-action: secret.version.update
      summary: Update secret version state.
      description: Enables, disables, or marks an encrypted secret version deleted.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SecretId'
        - $ref: '#/components/parameters/VersionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Secret version updated.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/secrets/{secretId}/bindings:
    get:
      tags: [Secrets]
      operationId: listSecretBindings
      x-discobot-action: secret.binding.list
      summary: List secret bindings.
      description: Lists project and agent-session targets where a secret is available and the scopes for each binding.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SecretId'
      responses:
        "200":
          description: Secret bindings.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      tags: [Secrets]
      operationId: createSecretBinding
      x-discobot-action: secret.bind
      summary: Bind a secret to a project or agent session.
      description: |
        Creates a binding that makes a secret eligible for use by a project or
        agent session with specific scopes. A binding does not itself make a
        secret decryptable; recipient wraps must exist for the target agent
        session public key.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SecretId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Secret binding created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/secrets/{secretId}/bindings/{bindingId}:
    delete:
      tags: [Secrets]
      operationId: deleteSecretBinding
      x-discobot-action: secret.binding.remove
      summary: Remove a secret binding.
      description: Removes a project or agent-session binding from a secret.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SecretId'
        - $ref: '#/components/parameters/BindingId'
      responses:
        "204":
          description: Secret binding removed.

  /v1/tokens/introspect:
    post:
      tags: [Tokens]
      operationId: introspectToken
      x-discobot-action: token.introspect
      summary: Introspect a token.
      description: |
        Optional token introspection endpoint for high-risk operations, ambiguous
        authorization cases, or long-running requests where local JWT validation
        is not sufficient.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Token introspection result.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /v1/audit-events:
    get:
      tags: [Audit]
      operationId: listAuditEvents
      x-discobot-action: audit_event.list
      summary: List audit events.
      description: Lists append-only audit events visible to the caller, filtered by route-level context such as project, agent session, target, action, result, or time range.
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: query
          required: false
          schema: { type: string }
          description: Filter by project context.
        - name: agentSessionId
          in: query
          required: false
          schema: { type: string }
          description: Filter by agent session context.
        - name: action
          in: query
          required: false
          schema: { type: string }
          description: Filter by router-level action name.
        - name: result
          in: query
          required: false
          schema: { type: string, enum: [success, denied, error] }
          description: Filter by event result.
      responses:
        "200":
          description: Audit events.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    OAuthApplicationRequest:
      type: object
      properties:
        name:
          type: string
        provider:
          type: string
          enum: [github, google]
        clientId:
          type: string
        clientSecret:
          type: string
        redirectUris:
          type: array
          items:
            type: string
        grantTypes:
          type: array
          items:
            type: string
        responseTypes:
          type: array
          items:
            type: string
        scopes:
          type: array
          items:
            type: string
        tokenEndpointAuthMethod:
          type: string
        status:
          type: string
          enum: [active, disabled]
        providerConfig:
          type: object
          additionalProperties: true
        github:
          type: object
          additionalProperties: true
        google:
          type: object
          additionalProperties: true
    OAuthApplicationCreateRequest:
      allOf:
        - $ref: '#/components/schemas/OAuthApplicationRequest'
      required: [name, provider, clientId]
    OAuthApplicationUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/OAuthApplicationRequest'

  parameters:
    AgentSessionId:
      name: agentSessionId
      in: path
      required: true
      schema: { type: string }
      description: Agent session ID.
    BindingId:
      name: bindingId
      in: path
      required: true
      schema: { type: string }
      description: Secret binding ID.
    DeviceId:
      name: deviceId
      in: path
      required: true
      schema: { type: string }
      description: User device ID.
    GroupId:
      name: groupId
      in: path
      required: true
      schema: { type: string }
      description: Group ID.
    IdentityId:
      name: identityId
      in: path
      required: true
      schema: { type: string }
      description: Group identity link ID.
    MemberId:
      name: memberId
      in: path
      required: true
      schema: { type: string }
      description: Project member row ID.
    OwnerId:
      name: ownerId
      in: path
      required: true
      schema: { type: string }
      description: Secret owner row ID.
    OAuthApplicationId:
      name: oauthApplicationId
      in: path
      required: true
      schema: { type: string }
      description: OAuth application ID.
    OrganizationDomain:
      name: organizationDomain
      in: path
      required: true
      schema: { type: string }
      description: Organization domain, such as `example.com`. The special `public` value addresses the public organization.
    ProjectId:
      name: projectId
      in: path
      required: true
      schema: { type: string }
      description: Project ID.
    SecretId:
      name: secretId
      in: path
      required: true
      schema: { type: string }
      description: Secret ID.
    SessionId:
      name: sessionId
      in: path
      required: true
      schema: { type: string }
      description: User session ID.
    UserId:
      name: userId
      in: path
      required: true
      schema: { type: string }
      description: User ID.
    VersionId:
      name: versionId
      in: path
      required: true
      schema: { type: string }
      description: Secret version ID.
