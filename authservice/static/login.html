<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{{ .Title }}</title>
	<style>
		:root {
			--bg: #0b1220;
			--panel: #111827;
			--panel-2: #1f2937;
			--border: #374151;
			--text: #f9fafb;
			--muted: #9ca3af;
			--accent: #60a5fa;
		}
		* { box-sizing: border-box; }
		body {
			margin: 0;
			font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			background: radial-gradient(circle at top, #1f2937 0%, #0b1220 45%);
			color: var(--text);
			display: grid;
			place-items: center;
			min-height: 100vh;
		}
		.card {
			width: min(440px, calc(100vw - 32px));
			background: rgba(17, 24, 39, 0.96);
			border: 1px solid rgba(96, 165, 250, 0.18);
			border-radius: 18px;
			padding: 28px;
			box-shadow: 0 32px 80px rgba(0, 0, 0, 0.35);
		}
		.badge {
			display: inline-block;
			padding: 6px 10px;
			border-radius: 999px;
			background: rgba(96, 165, 250, 0.12);
			color: #bfdbfe;
			font-size: 12px;
			font-weight: 600;
			margin-bottom: 16px;
		}
		h1 {
			margin: 0 0 8px;
			font-size: 28px;
		}
		p {
			margin: 0;
			color: var(--muted);
			line-height: 1.5;
		}
		.actions {
			display: grid;
			gap: 12px;
			margin-top: 24px;
		}
		.button {
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 10px;
			padding: 14px 16px;
			border-radius: 12px;
			text-decoration: none;
			font-weight: 600;
			border: 1px solid var(--border);
			background: var(--panel-2);
			color: var(--text);
		}
		.button:hover {
			border-color: var(--accent);
			transform: translateY(-1px);
		}
		.empty {
			margin-top: 24px;
			padding: 14px 16px;
			border-radius: 12px;
			border: 1px dashed var(--border);
			color: var(--muted);
		}
		.footer {
			margin-top: 18px;
			font-size: 12px;
			color: var(--muted);
		}
	</style>
</head>
<body>
	<div class="card">
		<div class="badge">Discobot Auth</div>
		<h1>{{ .Title }}</h1>
		<p>{{ .Subtitle }}</p>
		{{ if .HasProviders }}
		<div class="actions">
			{{ range .Providers }}
			<a class="button" href="{{ .URL }}">Continue with {{ .Name }}</a>
			{{ end }}
		</div>
		{{ else }}
		<div class="empty">No upstream identity providers are configured for this auth service.</div>
		{{ end }}
		<div class="footer">You’ll return to Discobot after sign-in.</div>
	</div>
</body>
</html>
