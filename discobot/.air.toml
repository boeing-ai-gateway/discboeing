root = "."
testdata_dir = "testdata"
tmp_dir = "build"

[build]
  args_bin = []
  entrypoint = "./build/discobot"
  cmd = "pnpm assets:build && pnpm generate && go build -gcflags=\"all=-N -l\" -o ./build/discobot ./cmd/discobot"
  delay = 1000
  exclude_dir = ["build", "vendor", "testdata", "node_modules"]
  exclude_file = []
  exclude_regex = ["_test.go", "_templ.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = "DISCOBOT_STATIC_DIR=./static DISCOBOT_DEV_RELOAD=1 ./build/discobot"
  include_dir = ["cmd", "content", "internal", "static"]
  include_ext = ["go", "templ", "html", "css", "js", "json"]
  include_file = [".env"]
  kill_delay = "10m"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
