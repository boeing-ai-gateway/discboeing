<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Discobot UI Go</title>
		<style>
			:root {
				color-scheme: light dark;
				font-family: Inter, ui-sans-serif, system-ui, sans-serif;
			}
			body {
				display: grid;
				min-height: 100vh;
				margin: 0;
				place-items: center;
				background: #0f172a;
				color: #f8fafc;
			}
			main {
				max-width: 36rem;
				padding: 2rem;
				text-align: center;
			}
			h1 {
				margin: 0 0 0.75rem;
				font-size: clamp(2.5rem, 8vw, 5rem);
				line-height: 1;
			}
			p {
				margin: 0;
				color: #cbd5e1;
				font-size: 1.125rem;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>Hello World</h1>
			<p>Discobot's Go UI rewrite serves files from disk.</p>
		</main>
	</body>
</html>
