name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # Build and push the runtime container image
  build-runtime-image:
    runs-on: depot-ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Depot
        uses: depot/setup-action@v1.7.1

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push runtime image
        uses: depot/build-push-action@v1.18.0
        with:
          project: bbqjs4tj1g
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Build and push the VZ VM image (needed for macOS Electron builds)
  # Depends on runtime image so crane can pull it during the Docker build
  build-vz-image:
    needs: build-runtime-image
    if: github.event_name != 'pull_request'
    runs-on: depot-ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Depot
        uses: depot/setup-action@v1.7.1

      - name: Log in to Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}-vz
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Compute preload image ref
        id: preload
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            IMAGE_TAG="${GITHUB_REF_NAME#v}"
          else
            IMAGE_TAG="main"
          fi
          echo "image=ghcr.io/${{ github.repository }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push VZ image
        uses: depot/build-push-action@v1.18.0
        with:
          project: bbqjs4tj1g
          context: .
          target: vz-image
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PRELOAD_IMAGE=${{ steps.preload.outputs.image }}

  # Build and push the WSL runtime image
  # Depends on runtime image so crane can pull it during the Docker build
  build-wsl-image:
    needs: build-runtime-image
    if: github.event_name != 'pull_request'
    runs-on: depot-ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Depot
        uses: depot/setup-action@v1.7.1

      - name: Log in to Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}-wsl
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Compute preload image ref
        id: preload
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            IMAGE_TAG="${GITHUB_REF_NAME#v}"
          else
            IMAGE_TAG="main"
          fi
          echo "image=ghcr.io/${{ github.repository }}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push WSL image
        uses: depot/build-push-action@v1.18.0
        with:
          project: bbqjs4tj1g
          context: .
          target: wsl-image
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PRELOAD_IMAGE=${{ steps.preload.outputs.image }}

  # Build Electron app and attach artifacts/updater metadata to the GitHub release (tags only)
  release-electron:
    needs:
      - build-vz-image
      - build-wsl-image
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: depot-macos-15
            target: aarch64-apple-darwin
            electron_platform: mac
            electron_arch: arm64
            guest: vz
            guest_arch: arm64
            asset_globs: |
              dist/*-arm64.dmg
              dist/*-arm64.dmg.blockmap
              dist/*-arm64.zip
              dist/*-arm64.zip.blockmap
              dist/latest-mac.yml
          - name: Windows amd64
            runner: depot-windows-2025-16
            target: x86_64-pc-windows-msvc
            electron_platform: win
            electron_arch: x64
            guest: wsl
            guest_arch: amd64
            asset_globs: |
              dist/*-x64.exe
              dist/*-x64.exe.blockmap
              dist/*-x64.zip
              dist/latest.yml
              dist/latest-x64.yml
            metadata_copies: |
              dist/latest.yml dist/latest-x64.yml
          - name: Windows arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            electron_platform: win
            electron_arch: arm64
            guest: wsl
            guest_arch: arm64
            asset_globs: |
              dist/*-arm64.exe
              dist/*-arm64.exe.blockmap
              dist/*-arm64.zip
              dist/latest-arm64.yml
            metadata_copies: |
              dist/latest.yml dist/latest-arm64.yml
          - name: Linux amd64
            runner: depot-ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            electron_platform: linux
            electron_arch: x64
            asset_globs: |
              dist/*-x86_64.AppImage
              dist/*-amd64.deb
              dist/*-x64.tar.gz
              dist/latest-linux.yml
          - name: Linux arm64
            runner: depot-ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            electron_platform: linux
            electron_arch: arm64
            asset_globs: |
              dist/*-arm64.AppImage
              dist/*-arm64.deb
              dist/*-arm64.tar.gz
              dist/latest-linux-arm64.yml

    runs-on: ${{ matrix.runner }}
    name: release-electron (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .node-version

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.26"

      # Install crane for extracting bundled guest images.
      - name: Install crane
        if: matrix.guest == 'vz' || matrix.guest == 'wsl'
        run: go install github.com/google/go-containerregistry/cmd/crane@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Extract VZ image files for packaged macOS builds.
      - name: Extract VZ image
        if: matrix.guest == 'vz'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GITHUB_TOKEN}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin
          IMAGE_REF="ghcr.io/${{ github.repository }}-vz:${GITHUB_REF_NAME#v}"
          echo "Extracting VZ image: ${IMAGE_REF}"
          node scripts/extract-vz-image.mjs "${IMAGE_REF}" ${{ matrix.guest_arch }}

      # Extract WSL image files for packaged Windows builds.
      - name: Extract WSL image
        if: matrix.guest == 'wsl'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GITHUB_TOKEN}" | crane auth login ghcr.io -u ${{ github.actor }} --password-stdin
          IMAGE_REF="ghcr.io/${{ github.repository }}-wsl:${GITHUB_REF_NAME#v}"
          echo "Extracting WSL image: ${IMAGE_REF}"
          node scripts/extract-wsl-image.mjs "${IMAGE_REF}" ${{ matrix.guest_arch }}

      - name: Parse version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"  # Strip 'v' prefix
          SHORT_SHA="${GITHUB_SHA::12}"
          echo "full=$TAG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "release=discobot@${TAG}+${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "sandbox_image=ghcr.io/${{ github.repository }}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "Full version: $TAG"
          echo "Short SHA: $SHORT_SHA"
          echo "Sentry release: discobot@${TAG}+${SHORT_SHA}"

      - name: Prepare Electron signing certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          python - <<'PY'
          import base64
          import os
          from pathlib import Path

          cert_path = Path(os.environ["RUNNER_TEMP"]) / "discobot-signing.p12"
          cert_path.write_bytes(base64.b64decode(os.environ["APPLE_CERTIFICATE"]))
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"CSC_LINK={cert_path}\n")
          PY

      - name: Set Electron package version
        shell: bash
        env:
          DISCOBOT_VERSION: ${{ steps.version.outputs.full }}
        run: |
          node -e 'const fs=require("fs"); const packagePath="package.json"; const packageJson=JSON.parse(fs.readFileSync(packagePath,"utf8")); packageJson.version=process.env.DISCOBOT_VERSION; fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);'

      - name: Build Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCOBOT_TARGET_TRIPLE: ${{ matrix.target }}
          DISCOBOT_VERSION: ${{ steps.version.outputs.full }}
          SANDBOX_IMAGE: ${{ steps.version.outputs.sandbox_image }}
          SANDBOX_IMAGE_REMOTE: ${{ steps.version.outputs.sandbox_image }}
          PUBLIC_SENTRY_DSN: ${{ secrets.DISCOBOT_SENTRY_DSN }}
          PUBLIC_SENTRY_APP_VERSION: ${{ steps.version.outputs.full }}
          PUBLIC_SENTRY_RELEASE: ${{ steps.version.outputs.release }}
          PUBLIC_SENTRY_DIST: electron
          PUBLIC_SENTRY_GIT_COMMIT: ${{ github.sha }}
          PUBLIC_SENTRY_GIT_TAG: ${{ github.ref_name }}
          PUBLIC_DISCOBOT_RELEASES_API_URL: https://api.github.com/repos/${{ github.repository }}/releases?per_page=20
          DISCOBOT_GITHUB_OAUTH_CLIENT_ID: ${{ secrets.DISCOBOT_GITHUB_OAUTH_CLIENT_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: >-
          pnpm dist:app --publish never
          --${{ matrix.electron_platform }}
          --${{ matrix.electron_arch }}

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --draft \
              --title "Discobot ${GITHUB_REF_NAME}" \
              --notes "See the assets below for download links." || \
            gh release view "${GITHUB_REF_NAME}" >/dev/null

      - name: Upload Electron release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_ASSET_GLOBS: ${{ matrix.asset_globs }}
          ELECTRON_METADATA_COPIES: ${{ matrix.metadata_copies }}
        shell: bash
        run: |
          shopt -s nullglob
          while read -r source target; do
            [ -n "${source}" ] || continue
            if [ ! -f "${source}" ]; then
              echo "Missing Electron updater metadata: ${source}" >&2
              find dist -maxdepth 1 -type f -print >&2
              exit 1
            fi
            cp "${source}" "${target}"
          done <<< "${ELECTRON_METADATA_COPIES}"

          artifacts=()
          while IFS= read -r pattern; do
            [ -n "${pattern}" ] || continue
            matches=( ${pattern} )
            artifacts+=( "${matches[@]}" )
          done <<< "${ELECTRON_ASSET_GLOBS}"

          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "Expected Electron release assets, found none:" >&2
            echo "${ELECTRON_ASSET_GLOBS}" >&2
            find dist -maxdepth 1 -type f -print >&2
            exit 1
          fi

          upload_artifacts=()
          for artifact in "${artifacts[@]}"; do
            if [ ! -f "${artifact}" ]; then
              echo "Missing Electron release asset: ${artifact}" >&2
              find dist -maxdepth 1 -type f -print >&2
              exit 1
            fi

            if [ "${RUNNER_OS}" = "Linux" ]; then
              upload_artifacts+=( "${PWD}/${artifact}" )
            else
              upload_artifacts+=( "${artifact}" )
            fi
          done

          echo "Uploading Electron release assets:"
          printf '  %s\n' "${artifacts[@]}"
          gh release upload "${GITHUB_REF_NAME}" "${upload_artifacts[@]}" --clobber
